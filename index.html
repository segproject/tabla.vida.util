<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Tabla de Vida Útil Dinámica</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f7fa;
      color: #333;
      touch-action: manipulation;
    }
    .tabs {
      display: flex;
      background: #2c3e50;
      color: white;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab {
      padding: 16px 20px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
      min-width: 180px;
      text-align: center;
      white-space: nowrap;
    }
    .tab:hover {
      background: #34495e;
    }
    .tab.active {
      background: #3498db;
    }
    .tab-content {
      display: none;
      padding: 16px;
    }
    .tab-content.active {
      display: block;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      font-size: 1.4em;
      margin-top: 0;
    }
    .nota-actualizacion {
      text-align: center;
      font-size: 0.85em;
      color: #666;
      margin-bottom: 15px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      align-items: flex-end;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      min-width: 150px;
    }
    label {
      font-size: 0.85em;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input, select {
      padding: 12px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      min-height: 44px;
      width: 100%;
      box-sizing: border-box;
    }
    .btn-view {
      background: #607D8B;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      min-height: 44px;
      width: auto;
      max-width: 140px;
      text-align: center;
      margin-left: 8px;
    }
    .btn-view:hover {
      background: #455A64;
    }
    .btn-view.active {
      background: #3498db;
      font-weight: bold;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-top: 10px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      background-color: #2c3e50;
      color: white;
      font-size: 0.9em;
    }

    /* Colores por categoría */
    .fila-carnicos { background-color: #ffebee; }
    .fila-quesos { background-color: #f3e5f5; }
    .fila-frutas { background-color: #e8f5e9; }
    .fila-salsas { background-color: #fff3e0; }
    .fila-otros { background-color: #e3f2fd; }
    .fila-preps { background-color: #f1f8e9; }
    tr:hover {
      filter: brightness(0.97);
    }

    /* Ocultar columnas según vista */
    .col-recibido, .col-preparado, .col-linea {
      display: table-cell;
    }
    .hide-recibido .col-recibido,
    .hide-preparado .col-preparado,
    .hide-linea .col-linea {
      display: none !important;
    }

    /* Examen */
    #seleccionProductos {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 12px;
      background: white;
      margin: 12px 0;
      border-radius: 6px;
    }
    .producto-item {
      margin: 8px 0;
    }
    .producto-item label {
      font-size: 1em;
      cursor: pointer;
      padding: 10px;
      display: block;
      border-radius: 4px;
    }
    .producto-item input[type="checkbox"] {
      width: 24px;
      height: 24px;
      margin-right: 12px;
      vertical-align: middle;
    }
    #tablaExamenManual input {
      width: 100%;
      padding: 12px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
      min-height: 48px;
      margin-bottom: 8px;
    }
    .emoji {
      font-weight: bold;
      font-size: 1.4em;
      display: inline-block;
      min-width: 28px;
      text-align: center;
      margin-left: 6px;
    }
    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #ddd;
      font-size: 0.95em;
    }
    .btn {
      background: #3498db;
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      justify-content: center;
      margin: 8px 0;
      width: 100%;
      max-width: 300px;
      box-sizing: border-box;
    }
    .btn-secondary {
      background: #7f8c8d;
      font-size: 14px;
      min-height: 40px;
      padding: 8px 12px;
    }
    #nuevoExamenBtn {
      background: #9c27b0 !important;
    }
    .correccion {
      margin: 10px 0;
      padding: 12px;
      background: #fff;
      border-left: 4px solid #ff9800;
      border-radius: 6px;
      font-size: 0.95em;
    }
    .correccion.correcta {
      border-left-color: #4caf50;
    }
    .correccion.incorrecta {
      border-left-color: #f44336;
    }

    /* Estilos nuevos para controles de selección */
    .eval-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
    }

    @media (max-width: 768px) {
      .controls { flex-direction: column; }
      table, thead, tbody, th, td, tr { display: block; }
      td {
        position: relative;
        padding-left: 50%;
        text-align: right;
        padding-top: 14px;
        padding-bottom: 14px;
      }
      td::before {
        content: attr(data-label);
        position: absolute;
        left: 12px;
        width: 45%;
        padding-right: 10px;
        font-weight: bold;
        text-align: left;
        font-size: 0.95em;
      }
      #tablaExamenManual thead { display: none; }
      #tablaExamenManual tr {
        display: block;
        margin-bottom: 24px;
        padding: 16px;
        border: 1px solid #eee;
        border-radius: 8px;
        background: #fafafa;
      }
      #tablaExamenManual td {
        display: flex;
        flex-direction: column;
        padding: 0 !important;
        text-align: left;
      }
      #tablaExamenManual td::before { display: none; }
      #tablaExamenManual td:first-child {
        font-weight: bold;
        margin-bottom: 12px;
        font-size: 1.1em;
      }
      #tablaExamenManual td:not(:first-child) { margin-bottom: 16px; }
    }
  </style>
</head>
<body>

<div class="tabs">
  <div class="tab active" data-tab="tabla">📊 Tabla de Vida Útil</div>
  <div class="tab" data-tab="examen">📝 Evaluación</div>
</div>

    </thead>
    <tbody id="tablaCuerpo"></tbody>
  </table>
</div>

<div id="examen" class="tab-content">

        </div>
    </div>
    <div style="flex: 1; min-width: 200px;">
        <label for="numAleatorios">Elegir cantidad al azar:</label>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="numAleatorios" placeholder="#" style="width: 70px;">
            <button class="btn btn-secondary" id="btnAzar" style="margin:0; background:#f39c12">Elegir al Azar 🎲</button>
        </div>
    </div>
  </div>

  <p>O marca manualmente los productos en la lista:</p>
  <div id="seleccionProductos"></div>
  
  <button class="btn" id="generarExamenManual">🚀 Comenzar Evaluación</button>

  <form id="formularioExamenManual" style="display:none;">
    <div style="overflow-x:auto;">
      <table id="tablaExamenManual">
        <thead>
          <tr>
            <th>Producto (Categoría)</th>

        </thead>

    <br>
    <button type="button" class="btn" id="calificarExamenManual">✅ Calificar</button>
    <button type="button" class="btn" id="nuevoExamenBtn" style="display:none;">🔄 Cambiar Productos</button>

  <div id="resultadoExamenManual" class="result" style="display:none;"></div>
</div>

  document.querySelectorAll('.tab').forEach(tab => {

    "CÁRNICOS": "fila-carnicos", "QUESOS": "fila-quesos", "FRUTAS Y VEGETALES": "fila-frutas",
    "SALSAS": "fila-salsas", "OTROS INSUMOS": "fila-otros", "PREPS": "fila-preps"
  };

  let etapaActiva = "todas";

  function renderTabla(data) {
    const cuerpo = document.getElementById("tablaCuerpo");
    cuerpo.innerHTML = "";
    if (data.length === 0) {
      cuerpo.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#888;">No se encontraron resultados.</td></tr>`;
      return;
    }
    data.forEach(item => {
      const fila = document.createElement("tr");
      fila.className = clasePorCategoria[item.cat] || "";
      fila.innerHTML = `
        <td data-label="Categoría">${item.cat}</td>
        <td data-label="Producto">${item.prod}</td>
        <td class="col-recibido" data-label="Recibido">${item.recibido || "–"}</td>
        <td class="col-preparado" data-label="Preparado">${item.preparado || "–"}</td>
        <td class="col-linea" data-label="Línea">${item.linea || "–"}</td>
      `;
      cuerpo.appendChild(fila);
    });
  }

  function aplicarVista(vista) {
    etapaActiva = vista;
    const tabla = document.getElementById("tablaVidaUtil");
    tabla.classList.remove("hide-recibido", "hide-preparado", "hide-linea");
    const container = document.getElementById("filtroEtapaContainer");
    
    if (vista === "todas") { container.style.display = "none"; } 
    else { container.style.display = "flex"; construirFiltroEtapa(vista); }

    if (vista === "recibido") tabla.classList.add("hide-preparado", "hide-linea");
    else if (vista === "preparado") tabla.classList.add("hide-recibido", "hide-linea");
    else if (vista === "linea") tabla.classList.add("hide-recibido", "hide-preparado");

  function ordenarValores(valores) {
    const numericos = [], horas = [], texto = [];
    valores.forEach(val => {
      if (/^\d+$/.test(val)) numericos.push(parseInt(val));
      else if (val.includes("hora")) horas.push(val);
      else texto.push(val);
    });
    numericos.sort((a, b) => a - b); horas.sort(); texto.sort();
    return [...numericos.map(String), ...horas, ...texto];
  }

  function construirFiltroEtapa(campo) {
    const select = document.getElementById("filtroEtapaValor");
    select.innerHTML = '<option value="">Todos los valores</option>';
    const texto = document.getElementById("buscador").value.toLowerCase().trim();
    const cat = document.getElementById("categoriaFiltro").value;
    const filtrados = datos.filter(item => (!texto || item.prod.toLowerCase().includes(texto)) && (!cat || item.cat === cat));
    const valores = new Set();
    filtrados.forEach(item => { if (item[campo]) valores.add(item[campo]); });
    ordenarValores(Array.from(valores)).forEach(val => {
      const opt = document.createElement("option"); opt.value = val; opt.textContent = val;
      select.appendChild(opt);
    });
  }

  function filtrarTabla() {
    const texto = document.getElementById("buscador").value.toLowerCase().trim();
    const cat = document.getElementById("categoriaFiltro").value;
    const valorEtapa = document.getElementById("filtroEtapaValor").value;
    const filtrados = datos.filter(item => {
      const coincideBusqueda = !texto || item.prod.toLowerCase().includes(texto);
      const coincideCat = !cat || item.cat === cat;
      let coincideEtapa = true;
      if (etapaActiva !== "todas" && valorEtapa) coincideEtapa = (item[etapaActiva] || "") === valorEtapa;
      return coincideBusqueda && coincideCat && coincideEtapa;
    });
    renderTabla(filtrados);
  }

  document.getElementById("buscador").addEventListener("input", () => { filtrarTabla(); if (etapaActiva !== "todas") construirFiltroEtapa(etapaActiva); });
  document.getElementById("categoriaFiltro").addEventListener("change", () => { filtrarTabla(); if (etapaActiva !== "todas") construirFiltroEtapa(etapaActiva); });
  document.getElementById("filtroEtapaValor").addEventListener("change", filtrarTabla);

  ["Todas", "Recibido", "Preparado", "Linea"].forEach(v => {
      document.getElementById(`btn${v}`).addEventListener("click", () => {
          document.querySelectorAll(".btn-view").forEach(b => b.classList.remove("active"));
          document.getElementById(`btn${v}`).classList.add("active");
          aplicarVista(v.toLowerCase());
          filtrarTabla();
      });
  });

  renderTabla(datos);
  document.getElementById("btnTodas").click();

  // === EXAMEN (Lógica mejorada) ===
  function cargarListaSeleccion() {
    const cont = document.getElementById("seleccionProductos");
    cont.innerHTML = "";
    datos.forEach((item, i) => {
      const div = document.createElement("div");
      div.className = "producto-item";
      div.innerHTML = `<label><input type="checkbox" data-index="${i}"> ${item.prod} <small>(${item.cat})</small></label>`;
      cont.appendChild(div);
    });
  }

  // BOTÓN: Seleccionar Todo
  document.getElementById("btnSeleccionarTodo").addEventListener("click", () => {
    document.querySelectorAll("#seleccionProductos input").forEach(chk => chk.checked = true);
  });

  // BOTÓN: Limpiar
  document.getElementById("btnDeseleccionarTodo").addEventListener("click", () => {
    document.querySelectorAll("#seleccionProductos input").forEach(chk => chk.checked = false);
  });

  // BOTÓN: Selección al Azar
  document.getElementById("btnAzar").addEventListener("click", () => {
    const num = parseInt(document.getElementById("numAleatorios").value);
    const checkboxes = Array.from(document.querySelectorAll("#seleccionProductos input"));
    
    if (isNaN(num) || num <= 0) {
        alert("Ingresa un número válido de productos.");
        return;
    }
    
    // Desmarcar todo primero
    checkboxes.forEach(c => c.checked = false);
    
    // Sortear índices
    const barajados = checkboxes.sort(() => 0.5 - Math.random());
    const seleccion = barajados.slice(0, num);
    
    seleccion.forEach(c => c.checked = true);
    
    if (num > checkboxes.length) alert("El número pedido es mayor al total de productos. Se seleccionaron todos.");
  });

  function reiniciarExamen() {
    document.getElementById("formularioExamenManual").style.display = "none";
    document.getElementById("resultadoExamenManual").style.display = "none";
    document.getElementById("nuevoExamenBtn").style.display = "none";
    document.getElementById("generarExamenManual").style.display = "flex";
  }

  document.getElementById("nuevoExamenBtn").addEventListener("click", reiniciarExamen);

  document.getElementById("generarExamenManual").addEventListener("click", () => {
    const checks = document.querySelectorAll("#seleccionProductos input[type='checkbox']:checked");
    if (checks.length === 0) { alert("Por favor, selecciona al menos un producto."); return; }
    
    const seleccionados = Array.from(checks).map(chk => datos[parseInt(chk.dataset.index)]);
    let html = "";
    seleccionados.forEach((item, i) => {
      html += `
        <tr>
          <td><strong>${item.prod}</strong><br><small>${item.cat}</small></td>
          <td><input type="text" name="r_${i}" data-real="${item.recibido}" placeholder="Recibido"><span class="emoji"></span></td>
          <td><input type="text" name="p_${i}" data-real="${item.preparado}" placeholder="Prep."><span class="emoji"></span></td>
          <td><input type="text" name="l_${i}" data-real="${item.linea}" placeholder="Línea"><span class="emoji"></span></td>
        </tr>`;
    });
    
    document.getElementById("cuerpoExamenManual").innerHTML = html;
    document.getElementById("formularioExamenManual").style.display = "block";
    document.getElementById("generarExamenManual").style.display = "none";
    document.getElementById("nuevoExamenBtn").style.display = "flex";
    window.scrollTo(0, document.getElementById("formularioExamenManual").offsetTop);
  });

  // Normalización para calificar
  function normalizar(texto) {
    if (!texto) return "";
    return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s*\.\s*/g, "").replace(/\s+/g, "").trim();
  }

  document.getElementById("calificarExamenManual").addEventListener("click", () => {
    const inputs = document.querySelectorAll("#cuerpoExamenManual input");
    let total = 0, correctos = 0, errores = [];
    
    inputs.forEach(input => {
      const user = input.value.trim();
      const real = input.dataset.real || "";
      total++;
      
      const esCorrecto = normalizar(user) === normalizar(real);
      const emojiSpan = input.nextElementSibling;
      
      if (esCorrecto) {
        correctos++;
        emojiSpan.textContent = "✅";
      } else {
        emojiSpan.textContent = "❌";
        const row = input.closest("tr");
        const prod = row.querySelector("strong").textContent;
        const col = input.placeholder;
        errores.push({ prod, col, user, real });
      }
    });

    const resDiv = document.getElementById("resultadoExamenManual");
    let msg = `<h3>Resultado: ${correctos}/${total}</h3>`;
    if (errores.length > 0) {
        errores.forEach(e => {
            msg += `<div class="correccion incorrecta"><strong>${e.prod}</strong> (${e.col}): Tu: "${e.user || '(vacío)'}" → Correcto: "${e.real}"</div>`;
        });
    } else { msg += `<div class="correccion correcta">¡Perfecto!</div>`; }
    
    resDiv.innerHTML = msg;
    resDiv.style.display = "block";
    resDiv.scrollIntoView();
  });

  document.querySelector('.tab[data-tab="examen"]').addEventListener('click', () => { setTimeout(cargarListaSeleccion, 100); });
  if (document.getElementById("examen").classList.contains("active")) cargarListaSeleccion();
</script>

</body>
</html>
